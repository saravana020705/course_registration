apiVersion: apps/v1
kind: Deployment
metadata:
  name: course-reg-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: course-reg
  template:
    metadata:
      labels:
        app: course-reg
    spec:
      containers:
      - name: course-container
        image: loganathant/course-reg:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: course-reg-service
spec:
  type: NodePort
  selector:
    app: course-reg
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30007
